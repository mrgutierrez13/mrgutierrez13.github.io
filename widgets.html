<div class="modal" id="modal">
    <div class="modal-backdrop" id="close-ext"></div>
    <div class="modal-body">
        <button class="modal-close" id="close">
            <label>x</label>
        </button>
        <a class="modal-noticia" href="https://www.boliviasegura.gob.bo/" target="_blank" rel="noopener noreferrer">
            <picture>
                <source media="(max-width: 767px)" sizes="1px" srcset="images/blank.gif 1w" />
                <source media="(min-width: 768px)" srcset="images/Banner-minimo.png" />
                <img src="images/Banner-minimo.png" alt="banner" />
            </picture>
        </a>
    </div>
</div>

<button id="myButton" class="open-button" onclick="openForm()">
    <img src="images/popup_logo.svg">
</button>
<div class="chat-popup" id="myForm">
    <form action="/action_page.php" class="form-container">
        <h1>VCI te asesora</h1>

        <div>
            <label for="msg"><b>Nombre</b></label>
            <input class="one-row" name="msg" required=""
                oninvalid="this.setCustomValidity('Por favor ingrese un nombre..')"
                oninput="setCustomValidity('')"></input>
        </div>
        <div>
            <label for="msg"><b>Correo electrónico</b></label>
            <input class="one-row" type="email" name="msg" required=""
                oninvalid="this.setCustomValidity('Por favor ingrese un correo valido..')"
                oninput="setCustomValidity('')"></input>
        </div>
        <div>
            <label for="msg"><b>Telefono</b></label>
            <input class="one-row" name="msg" required=""
                oninvalid="this.setCustomValidity('Por favor ingrese su Telefono..')"
                oninput="setCustomValidity('')"></input>
        </div>

        <label for="msg"><b>¿En que podria ayudarle el VCI?</b></label>
        <input class="many-row" name="msg" required="" placeholder="Escriba su consulta al VCI..."
            oninvalid="this.setCustomValidity('Por favor ingrese una consulta..')"
            oninput="setCustomValidity('')"></input>

        <button type="submit" class="btn">Enviar al VCI</button>
        <button type="button" class="btn cancel" onclick="closeForm()"><label>x</label></button>
    </form>
</div>
