<div class="modal" id="modal">
    <div class="modal-backdrop" id="close-ext"></div>
    <div class="modal-body">
        <button class="modal-close" id="close">
            <label>x</label>
        </button>
        <a class="modal-noticia" href="https://www.boliviasegura.gob.bo/" target="_blank" rel="noopener noreferrer">
            <picture>
                <source media="(max-width: 767px)" sizes="1px" srcset="images/blank.gif 1w" />
                <source media="(min-width: 768px)" srcset="images/Banner-minimo.png" />
                <img src="images/Banner-minimo.png" alt="banner" />
            </picture>
        </a>
    </div>
</div>

<button id="myButton" class="open-button" onclick="openForm()">
    <img src="images/popup_logo.svg">
</button>
<div class="chat-popup" id="myForm">    

        <form class="form-vci" action="" method="post">
            <h1>VCI te asesora</h1>
            <label for="field1">
                <span>Nombre:</span><input type="text" name="field1" required="true" 
                oninvalid="this.setCustomValidity('Por favor ingrese un nombre..')"
                oninput="setCustomValidity('')"/>
            </label>
            <label for="field2">
                <span>Email:</span><input type="email" name="field2" required="true" 
                oninvalid="this.setCustomValidity('Por favor ingrese una direccion de correo valida..')"
                oninput="setCustomValidity('')"/>
            </label>
            <label for="field3">
                <span>Teléfono/Celular:</span><input type="text" name="field3" required="true" 
                oninvalid="this.setCustomValidity('Por favor ingrese su número de teléfono..')"
                oninput="setCustomValidity('')"/>
            </label>
            <label id="mensaje-vci" for="field4">
                <span>¿En que podría ayudarle el VCI?</span>
                <textarea name="field4" onkeyup="adjust_textarea(this)" required="true"></textarea>
            </label>
            <label id="enviar-vci">
                <input type="submit" value="Enviar al VCI" />
            </label>
            <button type="button" class="btn cancel" onclick="closeForm()">
                <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" viewBox="0 0 1000 1000">
                    <g><path d="M141.7,990L500,631.7L858.3,990L990,858.2L631.8,500L990,141.8L858.3,10L500,368.2L141.7,10L10,141.8l358.2,358.2L10,858.2L141.7,990z"/></g>
                </svg>
            </button>
        </form>

</div>
