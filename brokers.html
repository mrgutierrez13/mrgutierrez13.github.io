<!doctype html>

<head>
    <link rel="stylesheet" href="styles/estilos_base.css">
    <link rel="stylesheet" href="styles/estilos_brokers.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <div class="barra-enlaces"></div>
    <div class="contenedor">
        <div class="cabezera"></div>
        <div class="contenido">
            <h1>Directorio de Brokers</h1>
            <ul id="authors"></ul>
        </div>
        <footer></footer>
    </div>
    <script src="scripts/cargar_base.js"></script>
    <script>

        function createNode(element) {
            return document.createElement(element);
        }

        function append(parent, el) {
            return parent.appendChild(el);
        }

        const ul = document.getElementById('authors');
        const url = 'https://randomuser.me/api/?results=10';

        fetch(url)
            .then((resp) => resp.json())
            .then(function (data) {
                let authors = data.results;
                return authors.map(function (author) {
                    let li = createNode('li'),
                        img = createNode('img'),
                        span = createNode('span');
                    img.src = author.picture.medium;
                    span.innerHTML = `${author.name.first} ${author.name.last}`;
                    append(li, img);
                    append(li, span);
                    append(ul, li);
                })
            })
            .catch(function (error) {
                console.log(error);
            });   
    </script>
</body>
