<!doctype html>

<head>
    <link rel="stylesheet" href="styles/estilos_base.css">
    <link rel="stylesheet" href="styles/estilos_mapa_geo.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <div class="barra-enlaces"></div>
    <div class="contenedor">
        <div class="cabezera"></div>
        <div class="contenido">
            <div class="contenido-mapa-georeferencial">
                <h1>Consultas a la Oferta Exportable - MAPAS </h1>
                <h2>Criterios de Búsqueda</h2>
                <div class="sector-busqueda-contenedor">
                    <div class="sector-busqueda">
                        <div class="sector-busqueda-nombre">DEPARTAMENTO</div>
                        <form>
                            <textarea id="sector-busqueda-caja" name="sector-busqueda-caja" rows="5"></textarea>
                        </form>
                    </div>
                    <div class="sector-busqueda">
                        <div class="sector-busqueda-nombre">PRODUCTO / NANDINA</div>
                        <form>
                            <textarea id="sector-busqueda-caja" name="sector-busqueda-caja" rows="5"></textarea>
                        </form>
                    </div>
                    <div class="sector-busqueda">
                        <div class="sector-busqueda-nombre">SECTOR ECONÓMICO</div>
                        <form>
                            <textarea id="sector-busqueda-caja" name="sector-busqueda-caja" rows="5"></textarea>
                        </form>
                    </div>
                    <div class="sector-busqueda">
                        <div class="sector-busqueda-nombre">NOMBRE DE LA EMPRESA</div>
                        <form>
                            <textarea id="sector-busqueda-caja" name="sector-busqueda-caja" rows="5"></textarea>
                        </form>
                    </div>
                </div>
                <button type="submit" id="submit-button" class="boton-mapa">Buscar</button>
                <button id="clean-button" class="boton-mapa">Limpiar</button>
                <a class="mapa-georeferencial" href="https://www.google.com/search?q=google+maps+bolivia#"
                    target="_blank" rel="noopener noreferrer"><img src="images/placeholder.png"></a>

        </div>
        <footer></footer>
    </div>
    <script src="scripts/cargar_base.js"></script>
