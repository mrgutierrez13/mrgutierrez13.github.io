<!doctype html>

<head>
    <link rel="stylesheet" href="styles/estilos_base.css">
    <link rel="stylesheet" href="styles/estilos_simlog.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <div class="barra-enlaces"></div>
    <div class="contenedor">
        <div class="cabezera"></div>
        <div class="contenido">

            <!-- Add a title -->
            <h1>Simulador Logistico</h1>

            <!-- Add a bit of text -->
            <p>Medio de transporte maritimo</p>

            <div class="simlog">
                <div id="scatter_area"></div>
            </div>

        </div>
        <footer></footer>
    </div>
    <script src="scripts/cargar_base.js"></script>
    <script src="https://d3js.org/d3.v4.js"></script>
    <script>

        // set the dimensions and margins of the graph
        var margin = { top: 10, right: 40, bottom: 30, left: 30 },
            width = 450 - margin.left - margin.right,
            height = 400 - margin.top - margin.bottom;

        // append the svg object to the body of the page
        var svG = d3.select("#scatter_area")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform",
                "translate(" + margin.left + "," + margin.top + ")");

        // Create data
        var data = [{ x: 10, y: 20 }, { x: 40, y: 90 }, { x: 80, y: 50 }]

        // X scale and Axis
        var x = d3.scaleLinear()
            .domain([0, 100])         // This is the min and the max of the data: 0 to 100 if percentages
            .range([0, width]);       // This is the corresponding value I want in Pixel
        svG
            .append('g')
            .attr("transform", "translate(0," + height + ")")
            .call(d3.axisBottom(x));

        // X scale and Axis
        var y = d3.scaleLinear()
            .domain([0, 100])         // This is the min and the max of the data: 0 to 100 if percentages
            .range([height, 0]);       // This is the corresponding value I want in Pixel
        svG
            .append('g')
            .call(d3.axisLeft(y));

        // Add 3 dots for 0, 50 and 100%
        svG
            .selectAll("whatever")
            .data(data)
            .enter()
            .append("circle")
            .attr("cx", function (d) { return x(d.x) })
            .attr("cy", function (d) { return y(d.y) })
            .attr("r", 7)
 
    </script>
</body>
