<!doctype html>

<head>
    <link rel="stylesheet" href="styles/estilos_base.css">
    <link rel="stylesheet" href="styles/estilos_normativas_fetch.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <div class="barra-enlaces"></div>
    <div class="contenedor">
        <div class="cabezera"></div>
        <div class="contenido">
            <h1>NORMATIVA</h1>
            <h2>NORMAS DE EXPORTACIÓN</h2>

            <div class="contenedor-tabla">
                <table class="tabla1">
                    <tr>
                        <th>Número</th>
                        <th>Fecha</th>
                        <th>Título</th>
                        <th>Descripción</th>
                    </tr>
                </table>
            </div>

        </div>
        <footer></footer>
    </div>
    <script src="scripts/cargar_base.js"></script>

    <script>

        fetch('leyes.json').then(function (response) {
            return response.json();
        }).then(function (json) {
            let leyes = json;

            const tabla = document.querySelector('.tabla1>tbody');

            for (let i = 0; i < leyes.length; i++) {

                const fila = document.createElement('tr');
                const numero = document.createElement('td');
                const fecha = document.createElement('td');
                const titulo = document.createElement('td');
                const descripcion = document.createElement('td');


                let str;
                str = leyes[i].ley.replace(/\s+/g, '');
                fila.setAttribute('class', str);

                numero.innerText = leyes[i].ley;
                fecha.innerText = leyes[i].fecha;
                titulo.innerText = leyes[i].titulo;
                descripcion.innerText = leyes[i].descripcion + '.';
                descripcion.setAttribute('class','desc');

                // append the elements to the DOM as appropriate, to add the product to the UI                
                fila.appendChild(numero);
                fila.appendChild(fecha);
                fila.appendChild(titulo);
                fila.appendChild(descripcion);
                tabla.appendChild(fila);
            }

        }).catch(function (err) {
            console.log('Problema de pedido: ' + err.message);
        });

    </script>


</body>
